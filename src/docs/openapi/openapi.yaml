openapi: 3.0.0
info:
  title: Hello Framework API
  version: 1.0.0
  description: Hello Framework の REST API 仕様
  contact:
    name: API Support
  license:
    name: MIT

servers:
  - url: http://localhost:3000
    description: 開発サーバー

paths:
  /health:
    get:
      summary: ヘルスチェック
      description: サーバーが正常に動作しているか確認
      operationId: getHealth
      tags:
        - System
      responses:
        '200':
          description: サーバーは正常です
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /hello:
    get:
      summary: 最新のHelloメッセージを取得
      description: データベースに登録された最新のHelloメッセージを取得します
      operationId: getLatestMessage
      tags:
        - Hello
      responses:
        '200':
          description: メッセージ取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetHelloResponse'
        '404':
          description: メッセージが見つかりません
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: サーバーエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      summary: 新しいHelloメッセージを作成
      description: 新しいHelloメッセージをデータベースに保存します
      operationId: createMessage
      tags:
        - Hello
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateHelloRequest'
      responses:
        '201':
          description: メッセージ作成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateHelloResponse'
        '400':
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '500':
          description: サーバーエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /hello/all:
    get:
      summary: 全てのHelloメッセージを取得
      description: データベースに登録されている全てのHelloメッセージを取得します
      operationId: getAllMessages
      tags:
        - Hello
      responses:
        '200':
          description: メッセージ取得成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GetHelloResponse'
        '500':
          description: サーバーエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /hello/{id}:
    get:
      summary: IDでHelloメッセージを取得
      description: 指定されたIDのHelloメッセージを取得します
      operationId: getMessageById
      tags:
        - Hello
      parameters:
        - name: id
          in: path
          required: true
          description: メッセージID
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: メッセージ取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetHelloResponse'
        '404':
          description: メッセージが見つかりません
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: サーバーエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    GetHelloResponse:
      type: object
      properties:
        id:
          type: integer
          description: メッセージID
          example: 1
        message:
          type: string
          description: メッセージ内容
          example: Hello World
      required:
        - id
        - message

    CreateHelloRequest:
      type: object
      properties:
        message:
          type: string
          minLength: 1
          maxLength: 255
          description: メッセージ内容
          example: Hello World
      required:
        - message

    CreateHelloResponse:
      type: object
      properties:
        id:
          type: integer
          description: 作成されたメッセージID
          example: 1
        message:
          type: string
          description: メッセージ内容
          example: Hello World
      required:
        - id
        - message

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: エラーメッセージ
          example: No hello message found
      required:
        - error

    ValidationErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: Validation failed
        details:
          type: array
          items:
            type: object
            properties:
              code:
                type: string
              message:
                type: string
              path:
                type: array
                items:
                  type: string
